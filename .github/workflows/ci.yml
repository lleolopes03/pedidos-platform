name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-v3-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-v3-

      - name: Testes order-service
        run: cd order-service && mvn test --no-transfer-progress

      - name: Testes notification-service
        run: cd notification-service && mvn test --no-transfer-progress

      - name: Upload relatorio de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            order-service/target/surefire-reports/
            notification-service/target/surefire-reports/

  build-docker:
    name: Build e Push Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}

      - name: Build e Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.sha }}